<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>SSNAKE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ============================================================
       Splash Screen: shown before everything else.
       Click/tap dismisses it, shows the start menu, starts music.
       ============================================================ -->
  <div id="splash-screen">
    <div class="splash-bg-grid" aria-hidden="true"></div>
    <div class="splash-content">
      <div class="splash-logo">
        <span class="splash-s1">SS</span><span class="splash-s2">NAKE</span><span class="splash-bang">!</span>
      </div>
      <div class="splash-snake-line" aria-hidden="true">
        <svg viewBox="0 0 320 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path class="splash-trail" d="M0 12 Q40 0 80 12 Q120 24 160 12 Q200 0 240 12 Q280 24 320 12" stroke="url(#trailGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
          <defs>
            <linearGradient id="trailGrad" x1="0" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4fd1e8" stop-opacity="0"/>
              <stop offset="40%" stop-color="#4fd1e8"/>
              <stop offset="70%" stop-color="#c792ff"/>
              <stop offset="100%" stop-color="#c792ff" stop-opacity="0"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <p class="splash-prompt">Click anywhere to begin</p>
    </div>
  </div>

  <!-- ============================================================
       Start Menu: full-screen overlay shown on desktop before first play.
       Hidden on mobile (TOUCH_MODE) via JS. Not shown during gameplay.
       ============================================================ -->
  <div id="start-menu" hidden>
    <div class="start-card">
      <h1 class="start-title">SSNAKE</h1>
      <p class="start-tagline">Choose your controls</p>

      <div class="control-options" id="control-options" role="group" aria-label="Control type">
        <button class="ctrl-btn" id="ctrl-mouse"    data-ctrl="mouse"    type="button">🖱 Mouse</button>
        <button class="ctrl-btn" id="ctrl-keyboard" data-ctrl="keyboard" type="button">⌨ Keyboard</button>
      </div>

      <p class="ctrl-hint" id="ctrl-hint"></p>

      <button id="start-play-btn" type="button" class="start-play-btn">PLAY</button>

      <p class="start-footer">Esc pauses · M mutes · F fullscreen</p>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="leaderboard-container" hidden>
    <h3>Top Scores</h3>
    <ol id="leaderboard-list"></ol>
  </div>

  <div id="highscore-submit-modal" hidden>
    <div class="modal-card">
      <h2>New Score: <span id="hs-score-value">0</span></h2>
      <p>Enter your initials to join the leaderboard</p>
      <input id="hs-nickname-input" type="text" maxlength="6" autocomplete="off" spellcheck="false" placeholder="ABCDEF" />
      <p id="hs-error" class="hs-error" hidden></p>
      <div class="modal-actions">
        <button id="hs-cancel-btn" type="button">Skip</button>
        <button id="hs-submit-btn" type="button">Submit</button>
      </div>
    </div>
  </div>

  <div id="pause-menu" hidden>
    <h2>Paused</h2>
    <div class="volume-control">
      <div class="volume-title">
        <span>Music</span>
        <input id="music-toggle" type="checkbox" title="Toggle music" />
      </div>
      <input id="music-vol" type="range" min="0" max="100" step="1" />
    </div>
    <div class="volume-control">
      <div class="volume-title">
        <span>Sounds</span>
        <input id="sfx-toggle" type="checkbox" title="Toggle sounds" />
      </div>
      <input id="sfx-vol" type="range" min="0" max="100" step="1" />
    </div>

    <!-- Control type switcher — only visible on desktop (not TOUCH_MODE) -->
    <div class="volume-control" id="pause-ctrl-row">
      <div class="volume-title"><span>Controls</span></div>
      <div class="control-options control-options--compact" id="pause-control-options" role="group" aria-label="Control type">
        <button class="ctrl-btn" id="p-ctrl-mouse"    data-ctrl="mouse"    type="button">🖱 Mouse</button>
        <button class="ctrl-btn" id="p-ctrl-keyboard" data-ctrl="keyboard" type="button">⌨ Keyboard</button>
      </div>
    </div>

    <label class="checkbox-row">
      <input id="fullscreen-toggle" type="checkbox" />
      Fullscreen
    </label>
    <button id="resume-btn" type="button">Resume</button>
    <p class="pause-hint">Esc resumes &middot; F fullscreen</p>
    <p id="track-name"></p>

    <details id="dev-section" hidden>
      <summary>Dev Mode</summary>
      <label class="checkbox-row">
        <input id="dev-mode-toggle" type="checkbox" />
        Enable (shows speed &amp; pellet count, unlocks tuning below)
      </label>
      <label class="checkbox-row">
        <input id="dev-immortal" type="checkbox" />
        Immortality (no death, hearts unaffected)
      </label>
      <label>Max speed <span id="dev-maxspeed-val" class="dev-val"></span>
        <input id="dev-maxspeed" type="range" min="100" max="800" step="10" />
      </label>
      <label>Turning speed <span id="dev-turnrate-val" class="dev-val"></span>
        <input id="dev-turnrate" type="range" min="1" max="10" step="0.1" />
      </label>
      <label>Boost speed <span id="dev-boost-val" class="dev-val"></span>
        <input id="dev-boost" type="range" min="100" max="300" step="5" />
      </label>
      <label>Slowdown speed <span id="dev-slow-val" class="dev-val"></span>
        <input id="dev-slow" type="range" min="10" max="100" step="5" />
      </label>
      <div class="dev-row">
        <label for="dev-level-select">Jump to level</label>
        <select id="dev-level-select">
          <option value="1">Level 1</option>
          <option value="2">Level 2</option>
          <option value="3">Level 3</option>
          <option value="4">Level 4 — Seeker Drone</option>
          <option value="5">Level 5 — Final Stage</option>
        </select>
        <button id="dev-launch-level">Launch</button>
      </div>
    </details>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
